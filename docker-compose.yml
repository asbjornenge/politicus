services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: politicus
      POSTGRES_PASSWORD: politicus
      POSTGRES_DB: politicus
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U politicus"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://politicus:politicus@db:5432/politicus
      PORT: 8080
      RPC_URL: https://rpc.shadownet.teztnets.com
      TZKT_API: https://api.shadownet.tzkt.io
      VARIABLES_ADDRESS: KT1CM56B5QdrVnBPc2RRc5KC9YeUJyxQGeWU
      TREASURY_ADDRESS: KT1KKH5KPTmYJ5NtLnShMiWHVhU4wik3Pcih
      IDENTITY_REGISTRY: KT1LBdKpeUNd2hq49q4keziRm431QYytyBfS
      BIT_REGISTRY: KT193vzUnno9keXoAgpCunscMUYUviREE96d
      PETITION_REGISTRY: KT1UEUHiDvszkQeRYNEexdTUgGxtfyaJ86xq
      MODERATION_REGISTRY: KT1PRAZuSK9gGBGukrtyuUwoVojhL9G6XyQU
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.politicus-api.rule=Host(`politicus.coder.surflabs.no`) && PathPrefix(`/api`)"
      - "traefik.http.routers.politicus-api.entrypoints=web"
      - "traefik.http.services.politicus-api.loadbalancer.server.port=8080"
    networks:
      - proxy
      - default
    depends_on:
      db:
        condition: service_healthy

  indexer:
    build: ./indexer
    environment:
      DATABASE_URL: postgres://politicus:politicus@db:5432/politicus
      TZKT_API: https://api.shadownet.tzkt.io
      IDENTITY_REGISTRY: KT1LBdKpeUNd2hq49q4keziRm431QYytyBfS
      BIT_REGISTRY: KT193vzUnno9keXoAgpCunscMUYUviREE96d
      PETITION_REGISTRY: KT1UEUHiDvszkQeRYNEexdTUgGxtfyaJ86xq
      MODERATION_REGISTRY: KT1PRAZuSK9gGBGukrtyuUwoVojhL9G6XyQU
      POLL_INTERVAL_MS: "10000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web:/app
      - /app/node_modules
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.politicus.rule=Host(`politicus.coder.surflabs.no`)"
      - "traefik.http.routers.politicus.entrypoints=web"
      - "traefik.http.services.politicus.loadbalancer.server.port=5173"
    networks:
      - proxy
      - default
    depends_on:
      - api

volumes:
  db_data:

networks:
  proxy:
    external: true
