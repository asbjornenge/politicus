services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: politicus
      POSTGRES_PASSWORD: politicus
      POSTGRES_DB: politicus
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U politicus"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://politicus:politicus@db:5432/politicus
      PORT: 8080
      RPC_URL: https://rpc.shadownet.teztnets.com
      VARIABLES_ADDRESS: KT19VGiw5XPZq5nu7f8xunabGvs6zhe7AdXh
      TREASURY_ADDRESS: KT1KKH5KPTmYJ5NtLnShMiWHVhU4wik3Pcih
      IDENTITY_REGISTRY: KT1LBdKpeUNd2hq49q4keziRm431QYytyBfS
      BIT_REGISTRY: KT1V6CeJkFFkgXU2iUr8T5wVuVzgxGJpjoCy
    ports:
      - "8088:8080"
    depends_on:
      db:
        condition: service_healthy

  indexer:
    build: ./indexer
    environment:
      DATABASE_URL: postgres://politicus:politicus@db:5432/politicus
      TZKT_API: https://api.shadownet.tzkt.io
      IDENTITY_REGISTRY: KT1LBdKpeUNd2hq49q4keziRm431QYytyBfS
      BIT_REGISTRY: KT1V6CeJkFFkgXU2iUr8T5wVuVzgxGJpjoCy
      POLL_INTERVAL_MS: "10000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
