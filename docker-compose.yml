services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ./api
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      PORT: 8080
      RPC_URL: ${POLITICUS_RPC_URL}
      TZKT_API: ${TZKT_API}
      IPFS_UPLOAD_URL: ${IPFS_UPLOAD_URL}
      IPFS_GATEWAY_URL: ${IPFS_GATEWAY_URL}
      VARIABLES_ADDRESS: ${VARIABLES_ADDRESS}
      TREASURY_ADDRESS: ${TREASURY_ADDRESS}
      IDENTITY_REGISTRY: ${IDENTITY_REGISTRY}
      BIT_REGISTRY: ${BIT_REGISTRY}
      PETITION_REGISTRY: ${PETITION_REGISTRY}
      MODERATION_REGISTRY: ${MODERATION_REGISTRY}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.politicus-api.rule=Host(`${POLITICUS_HOST}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.politicus-api.entrypoints=web"
      - "traefik.http.services.politicus-api.loadbalancer.server.port=8080"
    networks:
      - proxy
      - default
    depends_on:
      db:
        condition: service_healthy

  indexer:
    build: ./indexer
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      TZKT_API: ${TZKT_API}
      IDENTITY_REGISTRY: ${IDENTITY_REGISTRY}
      BIT_REGISTRY: ${BIT_REGISTRY}
      PETITION_REGISTRY: ${PETITION_REGISTRY}
      MODERATION_REGISTRY: ${MODERATION_REGISTRY}
      POLL_INTERVAL_MS: "10000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    volumes:
      - ./web:/app
      - /app/node_modules
    environment:
      VITE_ALLOWED_HOST: ${POLITICUS_HOST}
      VITE_API_TARGET: http://${POLITICUS_HOST}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.politicus.rule=Host(`${POLITICUS_HOST}`)"
      - "traefik.http.routers.politicus.entrypoints=web"
      - "traefik.http.services.politicus.loadbalancer.server.port=5173"
    networks:
      - proxy
      - default
    depends_on:
      - api

volumes:
  db_data:

networks:
  proxy:
    external: true
